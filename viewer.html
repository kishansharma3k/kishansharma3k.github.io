<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details | Kishan Sharma</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: -apple-system, sans-serif; overflow-y: auto; display: flex; flex-direction: column; min-height: 100vh; }
        
        .nav-header {
            position: sticky; top: 0; z-index: 100; padding: 15px 20px;
            background: rgba(5,5,5,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }
        .back-btn { color: #888; text-decoration: none; font-size: 14px; font-weight: bold; }

        .content-stack { width: 100%; max-width: 1200px; margin: 0 auto; flex: 1; }
        .media-item { width: 100%; background: #000; line-height: 0; margin-bottom: 5px; }
        img { width: 100%; height: auto; display: block; }
        
        .viewer-section { 
            width: 100%; aspect-ratio: 16 / 10; max-height: 800px; 
            background: #000; position: relative; margin-top: 20px; border: 1px solid #1a1a1a;
        }

        /* LOADING BLUR OVERLAY */
        #loading-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; transition: opacity 0.5s ease;
        }
        .spinner {
            width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #fff; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        model-viewer { width: 100%; height: 100%; }
        .wireframe-toggle {
            position: absolute; bottom: 20px; right: 20px; z-index: 10;
            padding: 10px 20px; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2); color: white;
            border-radius: 8px; cursor: pointer; backdrop-filter: blur(10px); font-size: 12px;
        }

        .site-footer {
            padding: 80px 20px; margin-top: 60px; border-top: 1px solid rgba(255,255,255,0.05);
            text-align: center; background: #000;
        }
        .footer-name { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .footer-contact { font-size: 13px; margin-bottom: 25px; }
        .footer-contact a { color: #666; text-decoration: none; }
        .social-links { display: flex; justify-content: center; gap: 15px; }
        .social-link {
            color: #888; text-decoration: none; font-size: 11px; font-weight: bold;
            letter-spacing: 2px; border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px; border-radius: 6px; transition: 0.3s;
        }
        .social-link:hover { color: #fff; background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.3); }
    </style>
</head>
<body>

    <nav class="nav-header">
        <a href="index.html" class="back-btn">← BACK</a>
        <div id="pTitle" style="font-weight:bold; text-transform:uppercase;">Project View</div>
        <div style="width:20px;"></div>
    </nav>

    <div class="content-stack" id="imageContainer"></div>

    <div class="content-stack">
        <div style="text-align:center; padding:40px 20px 10px; color:#444; letter-spacing:3px; font-size:10px;">3D INTERACTION</div>
        <div class="viewer-section">
            <div id="loading-overlay"><div class="spinner"></div></div>
            <button class="wireframe-toggle" id="wireBtn">WIREFRAME</button>
            <model-viewer id="mv" camera-controls auto-rotate shadow-intensity="1" environment-image="neutral" touch-action="pan-y"></model-viewer>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-name">Kishan Sharma</div>
        <div class="footer-contact">
            <a href="mailto:Kishansharma3k@gmail.com">9148804719 • Kishansharma3k@gmail.com</a>
        </div>
        <div class="social-links">
            <a href="https://www.artstation.com/kishan_sharma" target="_blank" class="social-link">ARTSTATION</a>
            <a href="https://www.linkedin.com/in/kishan-sharma-3057072b8/" target="_blank" class="social-link">LINKEDIN</a>
            <a href="https://www.instagram.com/kishansharma3m" target="_blank" class="social-link">INSTAGRAM</a>
        </div>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const folder = urlParams.get('folder');
        const imgStack = document.getElementById("imageContainer");
        const viewer = document.querySelector("#mv");
        const loader = document.getElementById("loading-overlay");

        if (folder) {
            document.getElementById("pTitle").innerText = folder;
            viewer.src = `projects/${folder}/model.glb`;

            viewer.addEventListener('load', () => {
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 500);
            });

            const names = ['render', 'uv', 'shot', '1', '2'];
            const exts = ['jpg', 'png', 'JPG', 'PNG'];

            names.forEach(name => {
                exts.forEach(ext => {
                    for(let i=1; i<=5; i++) {
                        const img = new Image();
                        const path = `projects/${folder}/${name}${i}.${ext}`;
                        img.src = path;
                        img.onload = () => {
                            if (!document.querySelector(`img[src="${path}"]`)) {
                                const div = document.createElement('div');
                                div.className = 'media-item';
                                div.innerHTML = `<img src="${path}">`;
                                imgStack.appendChild(div);
                            }
                        };
                    }
                });
            });

            let isWire = false;
            document.getElementById("wireBtn").onclick = () => {
                isWire = !isWire;
                viewer.src = isWire ? `projects/${folder}/model_wire.glb` : `projects/${folder}/model.glb`;
            };
        }
    </script>
</body>
</html>
