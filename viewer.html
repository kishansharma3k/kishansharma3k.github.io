<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Study | Kishan Sharma</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: -apple-system, sans-serif; overflow-y: auto; }
        .nav-header {
            position: sticky; top: 0; z-index: 100; padding: 15px 20px;
            background: rgba(5,5,5,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }
        .back-btn { color: #888; text-decoration: none; font-size: 14px; font-weight: bold; }
        .content-stack { width: 100%; max-width: 1200px; margin: 0 auto; }
        .media-item { width: 100%; margin-bottom: 10px; }
        img { width: 100%; height: auto; display: block; }
        .viewer-section { height: 80vh; width: 100%; border-top: 1px solid #222; background: #000; }
        model-viewer { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <nav class="nav-header">
        <a href="index.html" class="back-btn">← BACK</a>
        <div id="pName" style="font-weight:bold;">PROJECT</div>
        <div style="width:20px;"></div>
    </nav>

    <div class="content-stack" id="mediaStack">
        </div>

    <div style="text-align:center; padding:40px; color:#444;">3D INTERACTIVE MODEL</div>
    <div class="viewer-section">
        <model-viewer id="mv" camera-controls auto-rotate shadow-intensity="1" environment-image="neutral" touch-action="pan-y"></model-viewer>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const folder = urlParams.get('folder');
        const stack = document.getElementById("mediaStack");
        const viewer = document.querySelector("#mv");

        if (folder) {
            document.getElementById("pName").innerText = folder.toUpperCase();
            viewer.src = `projects/${folder}/model.glb`;

            // Look for renders 1-10
            for (let i = 1; i <= 10; i++) {
                const img = new Image();
                img.src = `projects/${folder}/render${i}.jpg`;
                img.onload = () => {
                    const div = document.createElement('div');
                    div.className = 'media-item';
                    div.innerHTML = `<img src="${img.src}">`;
                    stack.appendChild(div);
                };
            }
        }
    </script>
</body>
</html>
