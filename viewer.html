<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Technical Showcase | Kishan Sharma</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: -apple-system, sans-serif; color: white; }
        model-viewer { width: 100vw; height: 100vh; background-color: #0d0d0d; }

        /* Navigation */
        .back-nav { 
            position: fixed; top: 20px; left: 20px; z-index: 100; 
            padding: 12px 24px; background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2);
            color: white; border-radius: 12px; cursor: pointer; font-weight: bold;
        }

        .control-panel {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            display: flex; flex-direction: column; gap: 10px;
        }

        .tech-btn {
            padding: 12px 20px; background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);
            color: white; border-radius: 12px; cursor: pointer; font-weight: bold;
            transition: 0.3s; min-width: 140px;
        }
        .tech-btn:hover { background: rgba(255,255,255,0.2); border-color: #fff; }
        .tech-btn.active { background: #fff; color: #000; border-color: #fff; }

        /* UV Modal Layout */
        #uvModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 200; overflow-y: auto;
        }
        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px; padding: 100px 40px 40px; max-width: 1200px; margin: 0 auto;
        }
        .uv-item { background: #111; padding: 10px; border-radius: 10px; text-align: center; }
        .uv-item img { width: 100%; border-radius: 5px; }
        .close-uv { position: fixed; top: 30px; right: 40px; color: white; font-size: 40px; cursor: pointer; z-index: 210; }
    </style>
</head>
<body>

    <button class="back-nav" onclick="window.close()">← Exit</button>

    <div class="control-panel">
        <button class="tech-btn" id="uvBtn">UV GALLERY</button>
        <button class="tech-btn" id="wireBtn">WIREFRAME</button>
    </div>

    <div id="uvModal">
        <span class="close-uv" id="closeUv">&times;</span>
        <div class="gallery-grid" id="galleryGrid"></div>
    </div>

    <model-viewer 
        id="mv" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1" 
        exposure="1" 
        environment-image="neutral">
    </model-viewer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const folder = urlParams.get('folder');
        const viewer = document.querySelector("#mv");

        // Dynamic Paths
        const mainModel = `projects/${folder}/model.glb`;
        const wireModel = `projects/${folder}/model_wire.glb`;

        if (folder) {
            viewer.src = mainModel;
            
            // Build the UV gallery (checking up to 25)
            const grid = document.getElementById("galleryGrid");
            for(let i=1; i<=25; i++) {
                const img = new Image();
                img.src = `projects/${folder}/uv${i}.jpg`;
                img.onload = () => {
                    const div = document.createElement('div');
                    div.className = 'uv-item';
                    div.innerHTML = `<img src="${img.src}"><p style="font-size:10px; color:#555; margin-top:5px;">SET ${i}</p>`;
                    grid.appendChild(div);
                };
            }
        }

        // UV Modal Controls
        document.getElementById("uvBtn").onclick = () => document.getElementById("uvModal").style.display = "block";
        document.getElementById("closeUv").onclick = () => document.getElementById("uvModal").style.display = "none";
        
        // WIREFRAME SWAP LOGIC
        let isWireActive = false;
        const wireBtn = document.getElementById("wireBtn");

        wireBtn.onclick = function() {
            isWireActive = !isWireActive;
            
            // Toggle visual state of button
            this.classList.toggle('active');

            if(isWireActive) {
                // Swap to the wireframe GLB
                viewer.src = wireModel;
                this.innerText = "VIEW TEXTURED";
            } else {
                // Swap back to the original GLB
                viewer.src = mainModel;
                this.innerText = "WIREFRAME";
            }
        };
    </script>
</body>
</html>
