<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details | Kishan Sharma</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: -apple-system, sans-serif; overflow-y: auto; display: flex; flex-direction: column; min-height: 100vh; }
        
        .nav-header {
            position: sticky; top: 0; z-index: 100; padding: 15px 20px;
            background: rgba(5,5,5,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }
        .back-btn { color: #888; text-decoration: none; font-size: 14px; font-weight: bold; }

        .content-stack { width: 100%; max-width: 1200px; margin: 0 auto; flex: 1; }
        .media-item { width: 100%; background: #000; line-height: 0; margin-bottom: 5px; }
        img { width: 100%; height: auto; display: block; }
        
        .viewer-section { 
            width: 100%; 
            aspect-ratio: 16 / 10; 
            max-height: 800px; 
            background: #000; 
            position: relative; 
            margin-top: 20px;
            border: 1px solid #1a1a1a;
        }
        model-viewer { width: 100%; height: 100%; }

        .wireframe-toggle {
            position: absolute; bottom: 20px; right: 20px; z-index: 10;
            padding: 10px 20px; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2); color: white;
            border-radius: 8px; cursor: pointer; backdrop-filter: blur(10px);
            font-size: 12px; font-weight: bold;
        }

        .site-footer {
            padding: 60px 20px;
            margin-top: 80px;
            border-top: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            background: #000;
        }
        .footer-content { max-width: 600px; margin: 0 auto; }
        .footer-name { font-size: 18px; font-weight: bold; margin-bottom: 10px; opacity: 0.9; }
        .footer-contact { font-size: 13px; color: #666; letter-spacing: 1px; }
    </style>
</head>
<body>

    <nav class="nav-header">
        <a href="index.html" class="back-btn">← BACK</a>
        <div id="pTitle" style="font-weight:bold; text-transform:uppercase; letter-spacing:1px;">Project View</div>
        <div style="width:20px;"></div>
    </nav>

    <div class="content-stack" id="imageContainer"></div>

    <div class="content-stack">
        <div style="text-align:center; padding:60px 20px 20px; color:#444; letter-spacing:3px; font-size:10px;">3D INTERACTIVE VIEW</div>
        <div class="viewer-section">
            <button class="wireframe-toggle" id="wireBtn">WIREFRAME</button>
            <model-viewer id="mv" camera-controls auto-rotate shadow-intensity="1" environment-image="neutral" touch-action="pan-y"></model-viewer>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-name">Kishan Sharma</div>
            <div class="footer-contact">9148804719 • Kishansharma3k@gmail.com</div>
            <div style="margin-top: 20px; font-size: 11px; color: #333;">© 2026 DIGITAL PORTFOLIO</div>
        </div>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const folder = urlParams.get('folder');
        const imgStack = document.getElementById("imageContainer");
        const viewer = document.querySelector("#mv");
        const wireBtn = document.getElementById("wireBtn");

        if (folder) {
            document.getElementById("pTitle").innerText = folder;
            const mainModel = `projects/${folder}/model.glb`;
            const wireModel = `projects/${folder}/model_wire.glb`;
            viewer.src = mainModel;

            const names = ['render', 'uv', 'shot', '1', '2'];
            const exts = ['jpg', 'png', 'JPG', 'PNG'];

            names.forEach(name => {
                exts.forEach(ext => {
                    for(let i=1; i<=5; i++) {
                        const img = new Image();
                        const path = `projects/${folder}/${name}${i}.${ext}`;
                        img.src = path;
                        img.onload = () => {
                            if (!document.querySelector(`img[src="${path}"]`)) {
                                const div = document.createElement('div');
                                div.className = 'media-item';
                                div.innerHTML = `<img src="${path}">`;
                                // FIXED: Images now only insert into the dedicated image container
                                imgStack.appendChild(div);
                            }
                        };
                    }
                });
            });

            let isWire = false;
            wireBtn.onclick = () => {
                isWire = !isWire;
                viewer.src = isWire ? wireModel : mainModel;
                wireBtn.innerText = isWire ? "VIEW TEXTURED" : "WIREFRAME";
            };
        }
    </script>
</body>
</html>
