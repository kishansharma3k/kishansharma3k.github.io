<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Detail | Kishan Sharma</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        :root { --bg: #0a0a0a; --glass: rgba(255,255,255,0.03); }
        
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: -apple-system, sans-serif; overflow-x: hidden; 
        }

        /* Nav Bar */
        .nav-header {
            position: sticky; top: 0; z-index: 100;
            padding: 15px 5%; background: rgba(10,10,10,0.8);
            backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }
        .back-btn { color: #888; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .back-btn:hover { color: #fff; }

        /* Content Stack */
        .content-stack { width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px 0; }
        
        .media-item { width: 100%; margin-bottom: 10px; background: #111; display: block; }
        img, video { width: 100%; display: block; border-radius: 4px; }

        /* 3D Section */
        .viewer-section { 
            height: 80vh; margin-top: 40px; border-top: 1px solid #222;
            position: relative; background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        }
        model-viewer { width: 100%; height: 100%; }

        .section-label { 
            text-align: center; padding: 40px 0 20px; 
            color: #555; text-transform: uppercase; letter-spacing: 2px; font-size: 12px;
        }
    </style>
</head>
<body>

    <nav class="nav-header">
        <a href="index.html" class="back-btn">← BACK TO PORTFOLIO</a>
        <div id="project-title" style="font-weight: bold; letter-spacing: 1px;">PROJECT VIEW</div>
    </nav>

    <div class="content-stack" id="mediaStack">
        </div>

    <div class="section-label">Interactive 3D Preview</div>
    <div class="viewer-section">
        <model-viewer id="mv" camera-controls auto-rotate shadow-intensity="1" environment-image="neutral"></model-viewer>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const folder = urlParams.get('folder');
        const stack = document.getElementById("mediaStack");
        const viewer = document.querySelector("#mv");

        if (folder) {
            document.getElementById("project-title").innerText = folder.toUpperCase();
            
            // 1. Load Main Model
            viewer.src = `projects/${folder}/model.glb`;

            // 2. Load High-Res Images (Checks for 5 images)
            for(let i=1; i<=5; i++) {
                const img = new Image();
                img.src = `projects/${folder}/render${i}.jpg`; 
                img.onload = () => {
                    const div = document.createElement('div');
                    div.className = 'media-item';
                    div.innerHTML = `<img src="${img.src}">`;
                    stack.appendChild(div);
                };
            }

            // 3. Try to load a video if it exists
            const video = document.createElement('video');
            video.src = `projects/${folder}/video.mp4`;
            video.autoplay = true; video.muted = true; video.loop = true; video.playsinline = true;
            video.oncanplay = () => {
                const div = document.createElement('div');
                div.className = 'media-item';
                div.appendChild(video);
                stack.prepend(div); // Put video at the top
            };
        }
    </script>
</body>
</html>
