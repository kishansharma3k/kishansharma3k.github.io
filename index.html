<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishan Sharma | Portfolio</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        
        .nav-header {
            position: sticky; top: 0; z-index: 100; padding: 20px;
            background: rgba(5,5,5,0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center; font-weight: bold; letter-spacing: 2px;
        }

        /* RESTORED: Your original project card styling */
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; flex: 1; }
        
        .project-card {
            display: block;
            background: #111;
            border-radius: 20px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            margin-bottom: 30px;
            border: 1px solid #222;
            transition: 0.3s;
        }
        .project-card:hover { transform: scale(1.01); border-color: #444; }
        .project-card img { width: 100%; display: block; }
        .project-info { padding: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: #888; }

        /* FOOTER STYLING */
        .site-footer {
            padding: 80px 20px;
            margin-top: 60px;
            border-top: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            background: #000;
        }
        .footer-name { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .footer-contact { font-size: 13px; margin-bottom: 25px; }
        .footer-contact a { color: #666; text-decoration: none; }
        
        .social-links { display: flex; justify-content: center; gap: 15px; }
        .social-link {
            color: #888;
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 2px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 6px;
            transition: 0.3s;
        }
        .social-link:hover { color: #fff; background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.3); }
    </style>
</head>
<body>

</body>
