<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishan Sharma | Portfolio</title>
    <style>
        /* Base Styles */
        body { 
            margin: 0; 
            background: #050505; 
            color: white; 
            font-family: -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }

        /* Nav Header */
        .nav-header {
            position: sticky; top: 0; z-index: 100; padding: 25px;
            background: rgba(5,5,5,0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            text-align: center; font-weight: bold; letter-spacing: 4px;
            text-transform: uppercase; font-size: 14px;
        }

        /* RESTORED: Wide Banner Layout from your Screenshot */
        .main-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1;
        }

        .project-card {
            display: block;
            text-decoration: none;
            margin-bottom: 50px;
            transition: transform 0.3s ease;
        }

        .project-card:hover { transform: scale(1.01); }

        .banner-frame {
            width: 100%;
            background: #111;
            border-radius: 24px; /* Matches the high rounding in your screenshot */
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            line-height: 0;
        }

        .banner-frame img {
            width: 100%;
            height: auto;
            display: block;
        }

        .project-label {
            margin-top: 15px;
            padding-left: 10px;
            font-size: 11px;
            font-weight: bold;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* FOOTER */
        .site-footer {
            padding: 80px 20px;
            margin-top: 60px;
            border-top: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            background: #000;
        }
        .footer-name { font-size: 18px; font-weight: bold; margin-bottom: 10px; color: #fff; }
        .footer-contact { font-size: 13px; margin-bottom: 30px; }
        .footer-contact a { color: #555; text-decoration: none; transition: 0.3s; }
        .footer-contact a:hover { color: #fff; }

        .social-links { display: flex; justify-content: center; gap: 12px; }
        .social-link {
            color: #777;
            text-decoration: none;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 2px;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 12px 24px;
            border-radius: 8px;
            transition: 0.3s;
            background: rgba(255,255,255,0.02);
        }
        .social-link:hover { 
            color: #fff; 
            border-color: rgba(255,255,255,0.3); 
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <nav class="nav-header">KISHAN SHARMA</nav>

    <div class="main-container">
        <a href="viewer.html?folder=project1" class="project-card">
            <div class="banner-frame">
                <img src="projects/project1/render1.jpg" onerror="this.src='https://via.placeholder.com/1000x400/111/444?text=Project+Thumbnail'">
            </div>
            <div class="project-label">PROJECT ONE</div>
        </a>
    </div>

    <footer class="site-footer">
        <div class="footer-name">Kishan Sharma</div>
        <div class="footer-contact">
            <a href="mailto:Kishansharma3k@gmail.com">9148804719 • Kishansharma3k@gmail.com</a>
        </div>
        <div class="social-links">
            <a href="https://www.artstation.com/kishan_sharma" target="_blank" class="social-link">ARTSTATION</a>
            <a href="https://www.linkedin.com/in/kishan-sharma-3057072b8/" target="_blank" class="social-link">LINKEDIN</a>
            <a href="https://www.instagram.com/kishansharma3m" target="_blank" class="social-link">INSTAGRAM</a>
        </div>
    </footer>

</body>
</html>
