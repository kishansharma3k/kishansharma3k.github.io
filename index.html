<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishan Sharma | Portfolio</title>
    <style>
        body { 
            margin: 0; 
            background: #050505; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }
        
        /* Header & Nav */
        .nav-header {
            position: sticky; top: 0; z-index: 100; padding: 20px;
            background: rgba(5,5,5,0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .nav-logo { font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }

        /* Project Grid */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            flex: 1;
        }
        .project-card {
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            transition: transform 0.3s ease;
            border: 1px solid #222;
        }
        .project-card:hover { transform: translateY(-5px); border-color: #444; }
        .thumb { width: 100%; aspect-ratio: 16/10; background: #222; object-fit: cover; }
        .info { padding: 15px; font-weight: bold; text-transform: uppercase; font-size: 13px; }

        /* Footer Styles */
        .site-footer {
            padding: 80px 20px;
            margin-top: 80px;
            border-top: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            background: #000;
        }
        .footer-content { max-width: 600px; margin: 0 auto; }
        .footer-name { font-size: 18px; font-weight: bold; margin-bottom: 10px; opacity: 0.9; }
        .footer-contact { font-size: 13px; margin-bottom: 25px; }
        .footer-contact a { color: #666; text-decoration: none; transition: 0.3s; }
        .footer-contact a:hover { color: #fff; }

        .social-links { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .social-link {
            color: #888;
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 2px;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 6px;
        }
        .social-link:hover {
            color: #fff;
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <nav class="nav-header">
        <div class="nav-logo">KISHAN SHARMA</div>
    </nav>

    <div class="project-grid">
        <a href="viewer.html?folder=project1" class="project-card">
            <img src="projects/project1/render1.jpg" class="thumb" onerror="this.src='https://via.placeholder.com/400x250/111/444?text=Project+1'">
            <div class="info">Project One</div>
        </a>
        </div>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-name">Kishan Sharma</div>
            <div class="footer-contact">
                <a href="mailto:Kishansharma3k@gmail.com">9148804719 • Kishansharma3k@gmail.com</a>
            </div>
            <div class="social-links">
                <a href="https://www.artstation.com/kishan_sharma" target="_blank" class="social-link">ARTSTATION</a>
                <a href="https://www.linkedin.com/in/kishan-sharma-3057072b8/" target="_blank" class="social-link">LINKEDIN</a>
                <a href="https://www.instagram.com/kishansharma3m" target="_blank" class="social-link">INSTAGRAM</a>
            </div>
        </div>
    </footer>

</body>
</html>
