<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishan Sharma | Portfolio</title>
    <style>
        :root {
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: #050505;
            background: radial-gradient(circle at top, #1a1a1a 0%, #050505 100%);
            background-attachment: fixed;
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container { width: 100%; max-width: 1100px; }

        h1 { font-size: 2.5rem; margin-bottom: 40px; letter-spacing: -1px; }

        .grid {
            display: grid;
            /* This makes it 1 column on phone, 2+ on desktop */
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 16px;
            text-decoration: none;
            color: white;
            transition: 0.3s ease;
        }

        .img-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #111;
            border-radius: 16px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        img, video { width: 100%; height: 100%; object-fit: cover; }

        .tag { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        h2 { margin: 5px 0; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Projects</h1>
        <div class="grid">

            <div class="card">
                <div class="img-container">
                    <img src="project1/thumb.jpg" alt="Project 1">
                </div>
                <div class="tag">Image</div>
                <h2>Roadmap Tournament</h2>
            </div>

            <div class="card">
                <div class="img-container">
                    <video src="project3/demo.mp4" muted loop playsinline onmouseover="this.play()" onmouseout="this.pause()"></video>
                </div>
                <div class="tag">Video</div>
                <h2>Project 3 Example</h2>
            </div>

        </div>
    </div>
</body>
</html>
