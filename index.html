<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishan Sharma | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* FORCE SCROLLING: This overrides any hidden overflow in style.css */
        html, body {
            height: auto !important;
            overflow-y: auto !important; 
            margin: 0;
            background: #050505;
        }

        .main-canvas {
            display: block !important; /* Changed from flex to block to allow natural height */
            height: auto !important;
            min-height: 100vh;
            overflow: visible !important;
        }

        /* Spacing for the Project Section */
        .project-shelf {
            padding: 100px 20px 60px !important;
            display: block;
        }

        .shelf-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Footer Styling */
        .site-footer {
            padding: 100px 20px 60px;
            text-align: center;
            background: #000;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-family: -apple-system, sans-serif;
            position: relative;
            z-index: 10;
        }
        .footer-name { font-size: 18px; font-weight: bold; margin-bottom: 10px; color: #fff; }
        .footer-contact { font-size: 12px; color: #444; margin-bottom: 30px; letter-spacing: 1px; }
        .footer-contact a { color: inherit; text-decoration: none; }
        
        .social-links { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .social-link {
            color: #666;
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 2px;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px 25px;
            border-radius: 6px;
            transition: 0.3s;
            background: rgba(255,255,255,0.02);
        }
        .social-link:hover { 
            color: #fff; 
            border-color: rgba(255,255,255,0.2); 
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>
    <div class="main-canvas">
        <header class="hero-section">
            <div class="liquid-glass-card">
                <div class="avatar-container">
                    <img src="projects/profile/profile.png" id="profilePic" class="profile-img" 
                         onerror="this.onerror=null; this.src='projects/profile/profile.jpg';">
                </div>
                <h1 class="name-text">Kishan Sharma</h1>
                <p class="bio-text">3D Artist & Developer. Transforming complex ideas into interactive digital reality.</p>
                <div class="contact-footer">
                    <div class="phone-link">9148804719</div>
                    <div class="email-link">Kishansharma3k@gmail.com</div>
                </div>
            </div>
        </header>

        <section class="project-shelf">
            <div class="shelf-container">
                <div class="project-card" onclick="openProject('project1')">
                    <img src="projects/project1/thumb.png" class="card-bg-img" 
                         onerror="this.onerror=null; this.src='projects/project1/thumb.jpg';">
                    <div class="card-glass-overlay"></div>
                    <div class="project-info">
                        <h3>Project One</h3>
                        <p>3D Asset / Render</p>
                    </div>
                </div>

                <div class="project-card" onclick="openProject('project2')">
                    <img src="projects/project2/thumb.png" class="card-bg-img" 
                         onerror="this.onerror=null; this.src='projects/project2/thumb.jpg';">
                    <div class="card-glass-overlay"></div>
                    <div class="project-info">
                        <h3>Project Two</h3>
                        <p>3D Asset / Render</p>
                    </div>
                </div>
            </div>
        </section>

        <footer class="site-footer">
            <div class="footer-name">Kishan Sharma</div>
            <div class="footer-contact">
                <a href="mailto:Kishansharma3k@gmail.com">9148804719 • Kishansharma3k@gmail.com</a>
            </div>
            <div class="social-links">
                <a href="https://www.artstation.com/kishan_sharma" target="_blank" class="social-link">ARTSTATION</a>
                <a href="https://www.linkedin.com/in/kishan-sharma-3057072b8/" target="_blank" class="social-link">LINKEDIN</a>
                <a href="https://www.instagram.com/kishansharma3m" target="_blank" class="social-link">INSTAGRAM</a>
            </div>
        </footer>
    </div>

    <script>
        function openProject(targetFolder) {
            window.open(`viewer.html?folder=${targetFolder}`, '_self');
        }
    </script>
</body>
</html>
