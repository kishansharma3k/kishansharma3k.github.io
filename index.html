<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishan Sharma | Portfolio</title>
    <style>
        :root {
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 80px;
        }

        .container { width: 90%; max-width: 1100px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.06); }

        .img-container {
            width: 100%;
            height: 200px;
            background: #111;
            border-radius: 16px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        img, video { width: 100%; height: 100%; object-fit: cover; }

        .tag { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        h2 { margin: 5px 0; font-size: 1.4rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Projects</h1>
        <div class="grid">

            <div class="card">
                <div class="img-container">
                    <img src="project1/thumb.jpg" alt="Roadmap Tournament" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                    <div style="display:none; padding: 20px; color: #666;">Image not found in project1/thumb.jpg</div>
                </div>
                <div class="tag">Image</div>
                <h2>Roadmap Tournament</h2>
            </div>

            <div class="card">
                <div class="img-container">
                    <div style="padding: 20px; color: #666; text-align: center;">3D Model Placeholder</div>
                </div>
                <div class="tag">3D Asset</div>
                <h2>Project 2 Asset</h2>
            </div>

        </div>
    </div>
</body>
</html>
