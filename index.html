<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishan Sharma | Portfolio</title>
    <style>
        /* Base Setup */
        body { 
            margin: 0; 
            background: #050505; 
            color: white; 
            font-family: -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
        }

        /* Nav Header: Minimal & Dark */
        .nav-header {
            padding: 30px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }

        /* Center Content: This restores your specific layout */
        .content-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        /* Project Card: The HAHA banner style */
        .project-card {
            width: 100%;
            max-width: 900px; /* Restores the specific width from your screenshot */
            text-decoration: none;
            transition: 0.3s ease;
        }

        .project-card:hover { transform: translateY(-5px); }

        .image-box {
            width: 100%;
            background: #111;
            border-radius: 15px; /* Matches the rounding in Screenshot 203004 */
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            line-height: 0;
        }

        .image-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        .project-title {
            margin-top: 15px;
            font-size: 10px;
            font-weight: bold;
            color: #444; /* Dim color as seen in your screenshot */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Footer: Integrated into your old style */
        .site-footer {
            padding: 80px 20px;
            text-align: center;
            background: #000;
            border-top: 1px solid rgba(255,255,255,0.03);
        }

        .footer-name { font-size: 16px; font-weight: bold; margin-bottom: 8px; }
        .footer-info { font-size: 11px; color: #333; margin-bottom: 30px; letter-spacing: 1px; }
        .footer-info a { color: inherit; text-decoration: none; }

        .social-row { display: flex; justify-content: center; gap: 10px; }
        .social-btn {
            color: #555;
            text-decoration: none;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 2px;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 4px;
            transition: 0.3s;
        }
        .social-btn:hover { 
            color: #fff; 
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.02);
        }
    </style>
</head>
<body>

    <nav class="nav-header">KISHAN SHARMA</nav>

    <div class="content-body">
        <a href="viewer.html?folder=project1" class="project-card">
            <div class="image-box">
                <img src="projects/project1/render1.jpg" onerror="this.src='https://via.placeholder.com/1000x500/111/333?text=PROJECT+ONE'">
            </div>
            <div class="project-title">PROJECT ONE</div>
        </a>
    </div>

    <footer class="site-footer">
        <div class="footer-name">Kishan Sharma</div>
        <div class="footer-info">
            <a href="mailto:Kishansharma3k@gmail.com">9148804719 • Kishansharma3k@gmail.com</a>
        </div>
        <div class="social-row">
            <a href="https://www.artstation.com/kishan_sharma" target="_blank" class="social-btn">ARTSTATION</a>
            <a href="https://www.linkedin.com/in/kishan-sharma-3057072b8/" target="_blank" class="social-btn">LINKEDIN</a>
            <a href="https://www.instagram.com/kishansharma3m" target="_blank" class="social-btn">INSTAGRAM</a>
        </div>
    </footer>

</body>
</html>
